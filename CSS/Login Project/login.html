<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        background-color: #1a1a1a;
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .card {
        background-color: #d5d4d4;
        border-radius: 8px;
        padding: 30px;
        width: 300 px;
      }
      h2 {
        text-align: center;
        color: #374ac7;
        margin-bottom: 20px;
      }
      form {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      input {
        margin-bottom: 15px;
        padding: 10px;
        border-radius: 5px;
        background-color: #c8c6c6;
        border: 1px solid black;
      }
      button {
        background-color: #edea06;
        color: #1685ce;
        padding: 10px;
        border-radius: 8px;
      }
      button:hover {
        background-color: #c4c102;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Login</h2>
      <form>
        <input type="email" name="" id="" placeholder="Email" />
        <input type="Password" name="" id="" placeholder="Password" />
        <button type="Submit">Login</button>
      </form>
    </div>
  </body>
</html>
